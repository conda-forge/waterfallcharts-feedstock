{% set name = "waterfallcharts" %}
{% set version = "3.8" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/waterfallcharts-{{ version }}.tar.gz
  sha256: 01deb3464968bf6481f3b8b2cb09f2fb1011f1865fbb608e0520d7957bedd7b1

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}
    # the following dependencies are not correctly specified upstream
    - numpy
    - pandas
    - matplotlib-base

test:
  imports:
    - waterfall_chart
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/chrispaulca/waterfall
  summary: Quickly generates standard waterfall charts, takes two ordered lists as inputs.
  license: MIT
  # license is not packaged in source distribution
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - jeromebaum
